                { label: '파월군표', keyword: '군표' },
            ],
        };

        const buildCateSlots = (cateCd) => {
            const slots = ['', '', '', ''];
            if (!cateCd) return slots;
            if (cateCd.length > 3) {
                slots[0] = cateCd.substring(0, 3);
                slots[1] = cateCd;
                return slots;
            }
            const cat = CATEGORIES.find(c => c.id === cateCd);
            if (cat) slots[cat.slot] = cateCd;
            return slots;
        };

        const parseKeywordParts = (keyword) => keyword.split('%').map(k => k.trim()).filter(Boolean);

        function CatalogTree({ tree, expanded, onToggle, selectedId, onSelect }) {
            const renderNode = (node, depth = 0, parentCateCd = null) => {
                const nodeId = node.cateCd || node.label;
                const hasChildren = node.children && node.children.length > 0;
                const hasItems = node.items && node.items.length > 0;
                const isKeywordLeaf = node.keyword && !hasChildren && !hasItems;

                if (isKeywordLeaf) {
                    const itemId = `kw-${node.label}`;
                    const itemSelected = selectedId === itemId;
                    const targetCate = node.cateCd || parentCateCd || '003';
                    return (
                        <div
                            key={itemId}
                            onClick={() => onSelect({ type: 'item', cateCd: targetCate, id: itemId, label: node.label, keyword: node.keyword })}
                            className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer text-sm transition-colors ${itemSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-600'}`}
                            style={{ paddingLeft: `${depth * 18 + 28}px` }}
                        >
                            <span className="text-amber-400 text-sm">●</span>
                            <span className="flex-1">{node.label}</span>
                            <span className="text-xs text-gray-400 font-mono hidden sm:inline">{node.keyword}</span>
                        </div>
                    );
                }

                const isExpandable = hasChildren || hasItems;
                const isExpanded = expanded.has(nodeId);
                const isSelected = selectedId === nodeId;

                return (
                    <div key={nodeId} className="select-none">
                        <div
                            className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer transition-colors ${isSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-700'}`}
                            style={{ paddingLeft: `${depth * 18 + 8}px` }}
                        >
                            <button
                                type="button"
                                onClick={(e) => { e.stopPropagation(); if (isExpandable) onToggle(nodeId); }}
                                className={`w-6 h-6 flex items-center justify-center shrink-0 text-gray-400 ${isExpandable ? 'hover:text-amber-600' : 'invisible'}`}
                            >
                                {isExpanded ? Icons.ChevronDown : Icons.ChevronRight}
                            </button>
                            <span
                                className="flex-1 text-sm"
                                onClick={() => onSelect({ type: 'category', cateCd: node.cateCd, id: nodeId, label: node.label })}
                            >
                                {node.label}
                                {node.cateCd && <span className="ml-1 text-xs text-gray-400 font-normal">({node.cateCd})</span>}
                            </span>
                        </div>
                        {isExpanded && hasChildren && node.children.map(child => renderNode(child, depth + 1, node.cateCd))}
                        {isExpanded && hasItems && node.items.map((item, idx) => {
                            const itemId = `${node.cateCd}-${idx}`;
                            const itemSelected = selectedId === itemId;
                            return (
                                <div
                                    key={itemId}
                                    onClick={() => onSelect({ type: 'item', cateCd: node.cateCd, id: itemId, label: item.label, keyword: item.keyword })}
                                    className={`flex items-center gap-2 py-2.5 px-2 rounded-lg cursor-pointer text-sm transition-colors ${itemSelected ? 'bg-amber-100 text-amber-900 font-bold' : 'hover:bg-slate-50 text-gray-600'}`}
                                    style={{ paddingLeft: `${(depth + 1) * 18 + 28}px` }}
                                >
                                    <span className="text-amber-400 text-sm">●</span>
                                    <span className="flex-1">{item.label}</span>
                                    <span className="text-xs text-gray-400 font-mono hidden sm:inline">{item.keyword}</span>
                                </div>
                            );
                        })}
                    </div>
                );
            };
            return (
                <div className="flex-1 min-h-0 overflow-y-auto border border-amber-100 rounded-lg bg-amber-50/30 p-2">
                    {renderNode(tree)}
                </div>
            );
        }

        const joinKeywordsForSearch = (keywords) => {
            if (keywords.length === 0) return '';
            if (keywords.length === 1) return keywords[0];
            return keywords.join('%');
        };

        function App() {
            const [inputValue, setInputValue] = useState('');
            const [keywords, setKeywords] = useState([]);
            const [selectedCat, setSelectedCat] = useState('');
            const [selectedCatalogId, setSelectedCatalogId] = useState('');
            const [selectedCatalogLabel, setSelectedCatalogLabel] = useState('');
            const [expandedNodes, setExpandedNodes] = useState(new Set(['003']));
            const [sortMethod, setSortMethod] = useState('');
            const [itemsPerPage, setItemsPerPage] = useState('20');

            const isKoreanBanknote = selectedCat === '003' || (selectedCat && selectedCat.startsWith('003'));

            const handleCategoryClick = (id) => {
                if (id === '003') {
                    if (selectedCat === '003' || selectedCat.startsWith('003')) {
                        setSelectedCat('');
                        setSelectedCatalogId('');
                        setSelectedCatalogLabel('');
                    } else {
                        setSelectedCat('003');
                        setSelectedCatalogId('003');
                        setSelectedCatalogLabel('한국지폐');
                        setExpandedNodes(new Set(['003']));
                    }
                    return;
                }
                setSelectedCat(prev => prev === id ? '' : id);
                setSelectedCatalogId('');
                setSelectedCatalogLabel('');
            };

            const handleToggleNode = (nodeId) => {
                setExpandedNodes(prev => {
                    const next = new Set(prev);
                    if (next.has(nodeId)) next.delete(nodeId);
                    else next.add(nodeId);
                    return next;
                });
            };

            const handleCatalogSelect = (selection) => {
                setSelectedCat(selection.cateCd);
                setSelectedCatalogId(selection.id);
                setSelectedCatalogLabel(selection.label);
                if (selection.type === 'item') {
                    setKeywords(parseKeywordParts(selection.keyword));
                    setInputValue('');
                } else {
                    setKeywords([]);
                }
                setExpandedNodes(prev => {
                    const next = new Set(prev);
                    next.add('003');
                    if (selection.cateCd && selection.cateCd.length > 3) next.add(selection.cateCd);
                    return next;
                });
            };

            const addKeyword = () => {
                const trimmed = inputValue.trim();
                if (!trimmed || keywords.includes(trimmed)) return;
                setKeywords(prev => [...prev, trimmed]);
                setInputValue('');
            };

            const removeKeyword = (index) => {
                setKeywords(prev => prev.filter((_, i) => i !== index));
            };

            const getSearchKeywords = () => {
                const trimmed = inputValue.trim();
                if (!trimmed) return keywords;
                if (keywords.includes(trimmed)) return keywords;
                return [...keywords, trimmed];
            };

            const resetAll = () => {
                setInputValue(''); setKeywords([]); setSelectedCat('');
                setSelectedCatalogId(''); setSelectedCatalogLabel('');
                setExpandedNodes(new Set(['003']));
                setSortMethod(''); setItemsPerPage('20');
            };

            const buildSearchUrl = (searchKeywords) => {
                const baseUrl = 'https://donmoa.kr/goods/goods_search.php';
                const combinedKeyword = joinKeywordsForSearch(searchKeywords);

                if (selectedCat) {
                    const slots = buildCateSlots(selectedCat);

                    const params = ['mode=quick'];
                    slots.forEach(val => params.push(`quickCateGoods[]=${val}`));
                    params.push('goodsPrice[]=', 'goodsPrice[]=');
                    params.push(`keyword=${encodeURIComponent(combinedKeyword)}`);
                    if (sortMethod) params.push(`sort=${sortMethod}`);
                    params.push(`pageNum=${itemsPerPage}`);
                    return `${baseUrl}?${params.join('&')}`;
                }

                const params = [`keyword=${encodeURIComponent(combinedKeyword)}`];
                if (sortMethod) params.push(`sort=${sortMethod}`);
                params.push(`pageNum=${itemsPerPage}`);
                return `${baseUrl}?${params.join('&')}`;
            };

            const executeSearch = () => {
                const searchKeywords = getSearchKeywords();
                if (inputValue.trim() && !keywords.includes(inputValue.trim())) {
                    setKeywords(searchKeywords);
                    setInputValue('');
                }
                window.open(buildSearchUrl(searchKeywords), '_blank');
            };

            return (
                <div className="h-screen p-2 overflow-hidden">
                    <div className="w-full max-w-5xl mx-auto h-full bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200 flex flex-col">
                        
                        <div className="bg-white px-4 py-2 border-b border-gray-100 flex justify-between items-center shrink-0">
                            <div>
                                <h1 className="text-lg font-extrabold text-amber-900 flex items-center gap-2">
                                    <span className="text-amber-600">{Icons.Search}</span>
                                    돈모아 통합 검색
                                </h1>
                                <p className="text-gray-500 text-xs">
                                    <b>새 창</b>에서 <a href="https://donmoa.kr" target="_blank" rel="noopener noreferrer" className="text-amber-600 underline">donmoa.kr</a> 검색 · 단계별 <b>AND</b> 지원
                                </p>
                            </div>
                            <div className="flex items-center gap-1.5 shrink-0">
                                <button
                                    onClick={executeSearch}
                                    className="flex items-center gap-1 px-3 py-1.5 bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold rounded-md shadow transition-colors"
                                >
                                    {Icons.Search} 검색 (새 창)
                                </button>
                                <button onClick={resetAll} className="flex items-center gap-1 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-md text-xs font-bold text-gray-600 transition-colors">
                                    {Icons.Reset} 초기화
                                </button>
                            </div>
                        </div>

                        <div className="px-4 py-2 flex flex-col flex-1 min-h-0 overflow-hidden gap-2">
                            
                            <div className="shrink-0">
                                <div className="flex items-center justify-between mb-1">
                                    <label className="text-xs font-bold text-gray-700">검색어 입력</label>
                                    <span className="text-[10px] bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded-full font-bold">단계별 AND</span>
                                </div>
                                <div className="flex gap-1.5">
                                    <div className="relative flex-1">
                                        <input 
                                            type="text" 
                                            value={inputValue}
                                            onChange={(e) => setInputValue(e.target.value)}
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter') {
                                                    e.preventDefault();
                                                    inputValue.trim() ? addKeyword() : executeSearch();
                                                }
                                            }}
                                            placeholder="단어 입력 후 Enter 또는 [추가]"
                                            className="w-full h-9 pl-3 pr-8 border border-gray-200 rounded-lg text-sm focus:border-amber-500 focus:outline-none transition-colors"
                                        />
                                        {inputValue && (
                                            <button onClick={() => setInputValue('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500">
                                                {Icons.Close}
                                            </button>
                                        )}
                                    </div>
                                    <button
                                        onClick={addKeyword}
                                        disabled={!inputValue.trim()}
                                        className="h-9 px-3 bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg text-xs font-bold text-slate-700 transition-colors whitespace-nowrap"
                                    >
                                        + 추가
                                    </button>
                                </div>
                                {keywords.length > 0 && (
                                    <div className="mt-1.5 px-2 py-1.5 bg-slate-50 rounded-lg border border-slate-100">
                                        <div className="text-[10px] font-bold text-slate-500 mb-1">검색 단계</div>
                                        <div className="flex flex-wrap items-center gap-1">
                                            {keywords.map((kw, index) => (
                                                <React.Fragment key={`${kw}-${index}`}>
                                                    {index > 0 && <span className="text-amber-500 font-bold text-xs">%</span>}
                                                    <span className="inline-flex items-center gap-1 px-1.5 py-0.5 bg-white border border-amber-200 rounded text-xs font-bold text-amber-900">
                                                        <span className="text-[10px] text-amber-400">{index + 1}</span>
                                                        {kw}
                                                        <button onClick={() => removeKeyword(index)} className="text-gray-300 hover:text-red-500">
                                                            {Icons.Close}
                                                        </button>
                                                    </span>
                                                </React.Fragment>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <hr className="border-gray-100 shrink-0"/>

                            <div className={`flex flex-col min-h-0 ${isKoreanBanknote ? 'flex-1' : 'shrink-0'}`}>
                                <div className="shrink-0">
                                <div className="flex items-center gap-1.5 mb-1">
                                    <span className="text-gray-600 scale-90">{Icons.Category}</span>
                                    <span className="text-xs font-bold text-gray-700">카테고리</span>
                                    <span className="text-[10px] bg-red-50 text-red-500 px-1.5 py-0.5 rounded-full font-bold">1개만</span>
                                </div>
                                <div className="flex flex-wrap gap-1.5">
                                    {CATEGORIES.map(cat => {
                                        const isActive = cat.id === '003'
                                            ? isKoreanBanknote
                                            : selectedCat === cat.id;
                                        return (
                                            <div 
                                                key={cat.id}
                                                onClick={() => handleCategoryClick(cat.id)}
                                                className={`
                                                    flex items-center gap-1 px-2 py-1 rounded border cursor-pointer transition-all select-none text-xs
                                                    ${isActive
                                                        ? 'border-amber-500 bg-amber-50 text-amber-800 font-bold' 
                                                        : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'
                                                    }
                                                `}
                                            >
                                                <span className="scale-75">{isActive ? Icons.RadioOn : Icons.RadioOff}</span>
                                                {cat.label}
                                                <span className="text-[10px] text-gray-400 font-normal">({cat.id})</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                </div>

                                {isKoreanBanknote && (
                                    <div className="flex flex-col flex-1 min-h-0 mt-1.5">
                                        <div className="flex items-center justify-between mb-1 shrink-0">
                                            <span className="text-sm font-bold text-amber-800">한국지폐 카탈로그</span>
                                            <span className="text-xs text-gray-400">클릭 시 자동 설정</span>
                                        </div>
                                        <CatalogTree
                                            tree={KOREAN_BANKNOTE_TREE}
                                            expanded={expandedNodes}
                                            onToggle={handleToggleNode}
                                            selectedId={selectedCatalogId}
                                            onSelect={handleCatalogSelect}
                                        />
                                        {selectedCatalogLabel && (
                                            <div className="mt-1 text-xs text-amber-700 bg-amber-50 px-2 py-1.5 rounded shrink-0">
                                                선택: <b>{selectedCatalogLabel}</b>
                                                {selectedCat && <span className="ml-1 text-gray-500">({selectedCat})</span>}
                                                {keywords.length > 0 && (
                                                    <span className="ml-1 font-mono">{joinKeywordsForSearch(keywords)}</span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            <hr className="border-gray-100 shrink-0"/>

                            <div className="flex items-center gap-1.5 flex-nowrap shrink-0">
                                <span className="text-gray-600 scale-90 shrink-0">{Icons.Filter}</span>
                                <span className="text-xs font-bold text-gray-700 shrink-0">정렬</span>
                                <div className="flex flex-nowrap gap-1 overflow-x-auto">
                                    {SORT_OPTIONS.map(opt => (
                                        <button 
                                            key={opt.value}
                                            onClick={() => setSortMethod(opt.value)}
                                            className={`px-2 py-0.5 text-xs rounded border whitespace-nowrap transition-colors ${sortMethod === opt.value ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                        >
                                            {opt.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex items-center gap-1.5 flex-nowrap shrink-0">
                                <span className="text-gray-600 scale-90 shrink-0">{Icons.Eye}</span>
                                <span className="text-xs font-bold text-gray-700 shrink-0">보기</span>
                                <div className="flex flex-nowrap gap-1">
                                    {PAGE_SIZE_OPTIONS.map(size => (
                                        <button 
                                            key={size}
                                            onClick={() => setItemsPerPage(size)}
                                            className={`px-2 py-0.5 text-xs rounded border whitespace-nowrap transition-colors ${itemsPerPage === size ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                        >
                                            {size}개
                                        </button>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
